# Agent configuration — gateway API tokens and per-agent settings.
#
# Each agent gets a unique gateway token (NOT a provider API key).
# Agents authenticate with: Authorization: Bearer <token>
#
# Optional per-agent settings:
#   rate_limit_rpm   — max requests per minute (default: 60)
#   allowed_models   — restrict which pseudo/real models this agent can use
#                      (empty list = all allowed)

agents:
  claude-code:
    name: "Claude Code"
    token: "gw_claude_code_dev_001"
    rate_limit_rpm: 120
    allowed_models: []

  cursor:
    name: "Cursor IDE"
    token: "gw_cursor_dev_002"
    rate_limit_rpm: 120
    allowed_models: []

  tod:
    name: "Tod Agent"
    token: "gw_agent_tod_003"
    rate_limit_rpm: 60
    allowed_models:
      - deep-reasoning
      - cheap-research
      - coding
      - heartbeat

  langchain-app:
    name: "LangChain App"
    token: "gw_langchain_004"
    rate_limit_rpm: 30
    allowed_models: []

  test:
    name: "Test / Development"
    token: "gw_test_token_999"
    rate_limit_rpm: 10
    allowed_models: []
