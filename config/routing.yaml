# Pseudo-model routing configuration
# Each pseudo-model maps to one or more actual LLM models via a routing strategy.
#
# Strategies:
#   primary/fallback  — use primary, fall back on failure
#   local_first       — prefer local model, fall back to remote
#   round_robin       — rotate through a list of models
#   weighted          — probabilistic selection by weight
#
# Model identifiers follow LiteLLM conventions:
#   openrouter/<provider>/<model>
#   openai/<model>
#   anthropic/<model>
#   ollama/<model>              (local via Ollama)
#   ollama_chat/<model>         (local via Ollama chat endpoint)

pseudo_models:

  # Fast heartbeat / health-check model — local first, cheap remote fallback
  heartbeat:
    local_first:
      - ollama_chat/llama3.2:1b
    fallback:
      - openrouter/meta-llama/llama-3-8b-instruct

  # Cheap research tasks — round-robin across affordable providers
  cheap-research:
    round_robin:
      - openrouter/mistralai/mistral-small-latest
      - openrouter/deepseek/deepseek-chat
      - openrouter/meta-llama/llama-3.1-70b-instruct

  # Deep reasoning — best available model with fallback
  deep-reasoning:
    primary: openrouter/anthropic/claude-sonnet-4
    fallback:
      - openrouter/openai/gpt-4o
      - openrouter/google/gemini-2.0-flash-001

  # Coding assistant — optimized for code generation
  coding:
    primary: openrouter/anthropic/claude-sonnet-4
    fallback:
      - openrouter/openai/gpt-4o
      - openrouter/deepseek/deepseek-coder

  # Vision tasks — models with image understanding
  vision:
    primary: openrouter/openai/gpt-4o
    fallback:
      - openrouter/anthropic/claude-sonnet-4
      - openrouter/google/gemini-2.0-flash-001

  # Local-only — never leaves the machine
  local-only:
    local_first:
      - ollama_chat/llama3.2:3b
      - ollama_chat/llama3.1:8b

  # Budget model — cheapest available
  budget:
    weighted:
      - model: openrouter/meta-llama/llama-3.1-8b-instruct
        weight: 3
      - model: openrouter/mistralai/mistral-small-latest
        weight: 2
      - model: openrouter/deepseek/deepseek-chat
        weight: 5
