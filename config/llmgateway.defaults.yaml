# =============================================================================
# LLM Gateway — Default Configuration
# =============================================================================
# This file contains the shipped defaults. DO NOT edit this file.
# User overrides go in config/llmgateway.yaml (created on first run).
#
# The gateway service reads both files: defaults first, then user overrides.
# Reset to defaults by deleting config/llmgateway.yaml.
# =============================================================================

gateway:
  host: "127.0.0.1"
  port: 8080
  log_level: "INFO"

# ---------------------------------------------------------------------------
# Docker Model Runner — local LLM inference via Docker Desktop.
# Requires Docker Desktop 4.62+ with model runner enabled.
# Enable TCP access: docker desktop enable model-runner --tcp 12434
# ---------------------------------------------------------------------------
docker_model_runner:
  enabled: true
  host: "localhost"
  port: 12434
  api_base: "http://localhost:12434/engines/v1"

# ---------------------------------------------------------------------------
# Local services managed by the gateway.
# Only whisper is managed as a process — DMR models are managed by Docker.
# ---------------------------------------------------------------------------
services:
  whisper:
    enabled: false
    type: "whisper"
    description: "Whisper — Speech-to-text (whisper-server or mlx-whisper)"
    binary: "whisper-server"
    args:
      --model: ""
      --host: "127.0.0.1"
      --port: "8178"
    extra_args: []
    health_check_url: "http://localhost:8178/health"

# ---------------------------------------------------------------------------
# llmfit — hardware-aware model recommendations (optional CLI tool).
# ---------------------------------------------------------------------------
llmfit:
  auto_recommend_on_setup: true
  default_limit: 5

# ---------------------------------------------------------------------------
# Docker Compose stack (LiteLLM, Grafana, Prometheus, Loki).
# ---------------------------------------------------------------------------
docker:
  auto_launch: true
  compose_file: "docker/docker-compose.yml"
