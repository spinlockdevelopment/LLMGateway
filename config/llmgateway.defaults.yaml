# =============================================================================
# LLM Gateway — Default Configuration
# =============================================================================
# This file contains the shipped defaults. DO NOT edit this file.
# User overrides go in config/llmgateway.yaml (created on first run).
#
# The gateway service reads both files: defaults first, then user overrides.
# Reset to defaults by deleting config/llmgateway.yaml.
# =============================================================================

gateway:
  host: "127.0.0.1"
  port: 8080
  log_level: "INFO"

# ---------------------------------------------------------------------------
# Local inference services managed by the gateway.
# Set enabled: true to have the gateway start and monitor the service.
# Set enabled: false to skip (the service entry is preserved for later use).
# These are native llama-server / whisper-server processes.
#
# Service slots:
#
#   local         → single local model, backs the local-* LiteLLM routes
#   whisper-large → primary STT (high quality)
#   whisper-fast  → low-latency STT
#
# whisper-large and whisper-fast share a mutex group: only one runs at a time.
# ---------------------------------------------------------------------------
services:

  # Local model — one llama-server slot backing the local-code / local-think
  # / local-reason LiteLLM routes (they all share this backend; the thinking
  # mode is controlled per-route via chat_template_kwargs in litellm-config).
  #
  # Tuned for M4 / 32 GB unified memory. Assumes a 30–35B MoE model like
  # Qwen3.6-35B-A3B at Q4_K_M (~17 GB weights on disk). Sized to leave the
  # Docker stack (LiteLLM, Postgres, Grafana, Prometheus, Loki) room to run.
  #
  #   threads: 4        — base M4 perf-core count. M4 Pro has more perf
  #                       cores, but with -ngl 99 the GPU does the work and
  #                       llama.cpp never benefits from spilling onto
  #                       efficiency cores.
  #   ctx-size: 131072  — 128K with q4_0-quantized KV cache. q4_0 halves
  #                       per-token KV (~24 KB/token vs ~48 KB at q8_0), so
  #                       128K adds ~3 GB on top of the ~17 GB weights →
  #                       ~20 GB resident. Trades a small attention-
  #                       quantization quality cost for ~6 GB headroom.
  #   parallel: 1       — single in-flight request keeps the full 128K
  #                       window addressable per request (intended for
  #                       single-agent coding plans, not concurrent agents).
  local:
    enabled: false
    type: "llamacpp"
    model: "qwen3.6-35b"
    description: "Local model — llama-server (Qwen3.6-35B class)"
    binary: "llama-server"
    args:
      --host: "0.0.0.0"
      --port: "8082"
      --model: ""              # REQUIRED: path to the local model GGUF
      --n-gpu-layers: "99"
      --ctx-size: "131072"
      --threads: "4"
      --parallel: "1"
      --temp: "0.6"
      --top-p: "0.95"
      --top-k: "20"
      --min-p: "0"
    extra_args:
      - "--jinja"
      - "--reasoning-format"
      - "deepseek"
      - "--flash-attn"
      - "on"
      - "--cache-type-k"
      - "q4_0"
      - "--cache-type-v"
      - "q4_0"
      - "--cont-batching"
      - "--mlock"
      - "--no-context-shift"
    health_check_url: "http://localhost:8082/health"
    expected_memory_gb: 20.0

  # Primary STT. Whisper Large-v3.
  # MUTEX `whisper`: only one of {whisper-large, whisper-fast} runs.
  whisper-large:
    enabled: false
    type: "whisper"
    model: "whisper-large-v3"
    description: "Whisper Large-v3 (primary STT) — whisper-server"
    mutex_group: "whisper"
    binary: "whisper-server"
    args:
      --host: "0.0.0.0"
      --port: "8083"
      --model: ""              # REQUIRED: path to Whisper Large-v3 model
      --threads: "2"
    extra_args: []
    health_check_url: "http://localhost:8083/health"
    expected_memory_gb: 3.0

  # Fast STT — MLX-backed Whisper via mlx_audio.server (Metal GPU/ANE).
  # OpenAI-compatible POST /v1/audio/transcriptions on :8086. Model is
  # specified per-request; the default `mlx-community/whisper-small-asr-fp16`
  # ships the HuggingFace processor (preprocessor_config.json etc.) that
  # mlx_audio requires. Most other `*-mlx*` whisper repos in mlx-community
  # omit it and fail at decode time with `Processor not found`. Lazy-loaded
  # on first hit. No mutex with whisper-large — they run on different
  # backends and ports, both can coexist if memory allows.
  whisper-fast:
    enabled: false
    type: "audio"
    model: "mlx-community/whisper-small-asr-fp16"
    description: "MLX Whisper (fast STT) — mlx_audio.server"
    binary: "/Users/llmadmin/.llm-gateway/venv/bin/mlx_audio.server"
    args:
      --host: "0.0.0.0"
      --port: "8086"
    extra_args: []
    health_check_url: "http://localhost:8086/v1/models"
    expected_memory_gb: 0.5

  # Kokoro-82M TTS — MLX-backed via mlx_audio.server (Metal GPU/ANE).
  # OpenAI-compatible POST /v1/audio/speech on :8880. Replaces the previous
  # CPU-only docker container `ghcr.io/remsky/kokoro-fastapi-cpu`. The
  # Kokoro model is lazy-loaded on first request (~330 MB weights).
  kokoro:
    enabled: false
    type: "audio"
    model: "mlx-community/Kokoro-82M-bf16"
    description: "MLX Kokoro-82M TTS — mlx_audio.server"
    binary: "/Users/llmadmin/.llm-gateway/venv/bin/mlx_audio.server"
    args:
      --host: "0.0.0.0"
      --port: "8880"
    extra_args: []
    health_check_url: "http://localhost:8880/v1/models"
    expected_memory_gb: 0.5

# ---------------------------------------------------------------------------
# Docker Compose stack (LiteLLM, Grafana, Prometheus, Loki).
# ---------------------------------------------------------------------------
docker:
  auto_launch: true
  compose_file: "docker/docker-compose.yml"

# ---------------------------------------------------------------------------
# Health monitoring for all managed services.
# ---------------------------------------------------------------------------
health_check:
  interval_sec: 15
  restart_delay_sec: 5
  max_restart_attempts: 3
  restart_backoff_multiplier: 1.5

# ---------------------------------------------------------------------------
# Memory budget tracking (Apple Silicon unified memory).
# ---------------------------------------------------------------------------
memory:
  reserved_gb: 7               # reserved for macOS + Docker + overhead (M4/32GB)
  pressure_threshold: 0.90     # warn when used memory exceeds this fraction
