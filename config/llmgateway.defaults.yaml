# =============================================================================
# LLM Gateway — Default Configuration
# =============================================================================
# This file contains the shipped defaults. DO NOT edit this file.
# User overrides go in config/llmgateway.yaml (created on first run).
#
# The gateway service reads both files: defaults first, then user overrides.
# Reset to defaults by deleting config/llmgateway.yaml.
# =============================================================================

gateway:
  host: "127.0.0.1"
  port: 8080
  log_level: "INFO"

# ---------------------------------------------------------------------------
# Local inference services managed by the gateway.
# Set enabled: true to have the gateway start and monitor the service.
# Set enabled: false to skip (the service entry is preserved for later use).
# These are native llama-server / whisper-server processes — Docker Model
# Runner is no longer used for serving; it is kept only for model downloads.
# ---------------------------------------------------------------------------
services:

  # Triage / heartbeat. SmolLM2 — always-on small model. Backs `local-triage`
  # (and legacy `local-fast` / `heartbeat` aliases) in litellm-config.yaml.
  local-triage:
    enabled: false
    type: "llamacpp"
    model: "smollm2"
    description: "SmolLM2 triage — llama-server"
    binary: "llama-server"
    args:
      --host: "0.0.0.0"
      --port: "8081"
      --model: ""              # REQUIRED: path to SmolLM2 .gguf (Q8 recommended)
      --n-gpu-layers: "99"
      --ctx-size: "8192"
      --threads: "4"
      --parallel: "3"
    extra_args:
      - "--cont-batching"
      - "--mlock"
      - "--flash-attn"
      - "on"
    health_check_url: "http://localhost:8081/health"
    expected_memory_gb: 1.5

  # Agentic coder. Qwen3.6-35B-A3B (MoE, 3B active, April 2026, ~73 SWE-Bench
  # Verified). Backs `local-code` in litellm-config.yaml.
  # MUTEX `local-large`: one of {local-code, local-think, local-fallback} runs.
  local-code:
    enabled: false
    type: "llamacpp"
    model: "qwen3.6-35b-a3b"
    description: "Qwen3.6-35B-A3B (agentic coder) — llama-server"
    mutex_group: "local-large"
    binary: "llama-server"
    args:
      --host: "0.0.0.0"
      --port: "8082"
      --model: ""              # REQUIRED: path to Qwen3.6-35B-A3B UD-Q4_K_XL GGUF
      --ctx-size: "65536"
      --n-gpu-layers: "99"
      --parallel: "2"
      --temp: "0.7"
      --top-p: "0.8"
      --top-k: "20"
      --min-p: "0"
      --repeat-penalty: "1.05"
    extra_args:
      - "--jinja"
      - "--reasoning-format"
      - "deepseek"             # 3.6 supports thinking; surface as reasoning_content
      - "--flash-attn"
      - "on"
      - "--cache-type-k"
      - "q8_0"
      - "--cache-type-v"
      - "q8_0"
      - "--cont-batching"
      - "--mlock"
      - "--no-context-shift"
    health_check_url: "http://localhost:8082/health"
    expected_memory_gb: 25.0

  # General reasoning + thinking. Qwen3-30B-A3B (MoE). Same llama-server backs
  # both `local-think` (/think prefix) and `local-reason` (/no_think prefix)
  # routes in litellm-config.yaml — LiteLLM injects the system_prompt_prefix.
  # MUTEX `local-large`: one of {local-code, local-think, local-fallback} runs.
  local-think:
    enabled: false
    type: "llamacpp"
    model: "qwen3-30b-a3b"
    description: "Qwen3-30B-A3B (thinking) — llama-server"
    mutex_group: "local-large"
    binary: "llama-server"
    args:
      --host: "0.0.0.0"
      --port: "8084"
      --model: ""              # REQUIRED: path to Qwen3-30B-A3B-Q4_K_M.gguf
      --ctx-size: "65536"
      --n-gpu-layers: "99"
      --parallel: "2"
      --temp: "0.6"
      --top-p: "0.95"
      --top-k: "20"
      --min-p: "0"
    extra_args:
      - "--jinja"
      - "--reasoning-format"
      - "deepseek"
      - "--flash-attn"
      - "on"
      - "--cache-type-k"
      - "q8_0"
      - "--cache-type-v"
      - "q8_0"
      - "--cont-batching"
      - "--mlock"
      - "--no-context-shift"
    health_check_url: "http://localhost:8084/health"
    expected_memory_gb: 22.0

  # Memory-constrained fallback. Qwen3-14B (dense Q4_K_M, ~9 GB weights). Use
  # when Whisper Large is loaded and the bigger MoE models won't fit. Backs
  # `local-fallback` in litellm-config.yaml.
  # MUTEX `local-large`: one of {local-code, local-think, local-fallback} runs.
  local-fallback:
    enabled: false
    type: "llamacpp"
    model: "qwen3-14b"
    description: "Qwen3-14B (fallback / memory-constrained) — llama-server"
    mutex_group: "local-large"
    binary: "llama-server"
    args:
      --host: "0.0.0.0"
      --port: "8085"
      --model: ""              # REQUIRED: path to Qwen3-14B-Q4_K_M.gguf
      --ctx-size: "32768"
      --n-gpu-layers: "99"
      --parallel: "2"
      --temp: "0.6"
      --top-p: "0.95"
      --top-k: "20"
      --min-p: "0"
    extra_args:
      - "--jinja"
      - "--reasoning-format"
      - "deepseek"
      - "--flash-attn"
      - "on"
      - "--cache-type-k"
      - "q8_0"
      - "--cache-type-v"
      - "q8_0"
      - "--cont-batching"
      - "--mlock"
      - "--no-context-shift"
    health_check_url: "http://localhost:8085/health"
    expected_memory_gb: 12.0

  # Primary STT. Whisper Large-v3.
  # MUTEX `whisper`: one of {whisper-large, whisper-fast} runs.
  whisper-large:
    enabled: false
    type: "whisper"
    model: "whisper-large-v3"
    description: "Whisper Large-v3 (primary STT) — whisper-server"
    mutex_group: "whisper"
    binary: "whisper-server"
    args:
      --host: "0.0.0.0"
      --port: "8083"
      --model: ""              # REQUIRED: path to Whisper Large-v3 model
      --threads: "2"
    extra_args: []
    health_check_url: "http://localhost:8083/health"
    expected_memory_gb: 3.0

  # Fast STT (Whisper Small or Distil). Lower latency / quality.
  # MUTEX `whisper`: one of {whisper-large, whisper-fast} runs.
  whisper-fast:
    enabled: false
    type: "whisper"
    model: "whisper-small"
    description: "Whisper Small/Distil (fast STT) — whisper-server"
    mutex_group: "whisper"
    binary: "whisper-server"
    args:
      --host: "0.0.0.0"
      --port: "8086"
      --model: ""              # REQUIRED: path to Whisper Small or Distil model
      --threads: "2"
    extra_args: []
    health_check_url: "http://localhost:8086/health"
    expected_memory_gb: 1.0

# ---------------------------------------------------------------------------
# Docker Compose stack (LiteLLM, Grafana, Prometheus, Loki).
# ---------------------------------------------------------------------------
docker:
  auto_launch: true
  compose_file: "docker/docker-compose.yml"

# ---------------------------------------------------------------------------
# Health monitoring for all managed services.
# ---------------------------------------------------------------------------
health_check:
  interval_sec: 15
  restart_delay_sec: 5
  max_restart_attempts: 3
  restart_backoff_multiplier: 1.5

# ---------------------------------------------------------------------------
# Memory budget tracking (Apple Silicon unified memory).
# ---------------------------------------------------------------------------
memory:
  reserved_gb: 7               # reserved for macOS + Docker + overhead
  pressure_threshold: 0.90     # warn when used memory exceeds this fraction
