# =============================================================================
# LLM Gateway — Default Configuration
# =============================================================================
# This file contains the shipped defaults. DO NOT edit this file.
# User overrides go in config/llmgateway.yaml (created on first run).
#
# The gateway service reads both files: defaults first, then user overrides.
# Reset to defaults by deleting config/llmgateway.yaml.
# =============================================================================

gateway:
  host: "127.0.0.1"
  port: 8080
  log_level: "INFO"

# ---------------------------------------------------------------------------
# Local inference services managed by the gateway.
# Set enabled: true to have the gateway start and monitor the service.
# Set enabled: false to skip (the service entry is preserved for later use).
# These are native llama-server / whisper-server processes — Docker Model
# Runner is no longer used for serving; it is kept only for model downloads.
#
# Five service slots, matching the LiteLLM route names in litellm-config.yaml:
#
#   local-fast      → fast small-context model (heartbeat / triage / smoke tests)
#   local-coding    → coder model (backs `local-coding` and `local-only` fallback)
#   local-reason    → general reasoning (backs `local-reason` and `local-only`)
#   whisper-large   → primary STT (high quality)
#   whisper-fast    → low-latency STT
#
# local-coding and local-reason share a mutex group: only one of the two can
# load at a time on memory-constrained hosts (≤32 GB unified memory).
# whisper-large and whisper-fast share a mutex group for the same reason.
# ---------------------------------------------------------------------------
services:

  # Fast small-context model — heartbeat, smoke tests, local-only routes.
  # SmolLM2 or any similarly small llama-server-compatible GGUF.
  local-fast:
    enabled: false
    type: "llamacpp"
    model: "smollm2"
    description: "Fast model — llama-server"
    binary: "llama-server"
    args:
      --host: "0.0.0.0"
      --port: "8081"
      --model: ""              # REQUIRED: path to SmolLM2 (or similar small) GGUF
      --n-gpu-layers: "99"
      --ctx-size: "8192"
      --threads: "4"
      --parallel: "3"
    extra_args:
      - "--cont-batching"
      - "--mlock"
      - "--flash-attn"
      - "on"
    health_check_url: "http://localhost:8081/health"
    expected_memory_gb: 1.5

  # Local coding model — backs LiteLLM's `local-coding` route and is the
  # fallback for `local-only`. Qwen3-Coder-30B-A3B (or any coder GGUF).
  # MUTEX `local-large`: only one of {local-coding, local-reason} runs.
  local-coding:
    enabled: false
    type: "llamacpp"
    model: "qwen3-coder-30b-a3b-instruct"
    description: "Local coding model — llama-server"
    mutex_group: "local-large"
    binary: "llama-server"
    args:
      --host: "0.0.0.0"
      --port: "8082"
      --model: ""              # REQUIRED: path to coder GGUF
      --n-gpu-layers: "99"
      --ctx-size: "16384"
      --threads: "6"
      --parallel: "2"
    extra_args:
      - "--cont-batching"
      - "--mlock"
      - "--flash-attn"
      - "on"
    health_check_url: "http://localhost:8082/health"
    expected_memory_gb: 18.0

  # General reasoning. Qwen3-30B-A3B (MoE) or similar. Backs LiteLLM's
  # `local-reason` route and is the primary backend for `local-only`.
  # MUTEX `local-large`: only one of {local-coding, local-reason} runs.
  local-reason:
    enabled: false
    type: "llamacpp"
    model: "qwen3-30b-a3b"
    description: "Qwen3-30B-A3B (general reasoning) — llama-server"
    mutex_group: "local-large"
    binary: "llama-server"
    args:
      --host: "0.0.0.0"
      --port: "8084"
      --model: ""              # REQUIRED: path to Qwen3-30B-A3B GGUF
      --ctx-size: "65536"
      --n-gpu-layers: "99"
      --parallel: "2"
      --temp: "0.6"
      --top-p: "0.95"
      --top-k: "20"
      --min-p: "0"
    extra_args:
      - "--jinja"
      - "--reasoning-format"
      - "deepseek"
      - "--flash-attn"
      - "on"
      - "--cache-type-k"
      - "q8_0"
      - "--cache-type-v"
      - "q8_0"
      - "--cont-batching"
      - "--mlock"
      - "--no-context-shift"
    health_check_url: "http://localhost:8084/health"
    expected_memory_gb: 22.0

  # Primary STT. Whisper Large-v3.
  # MUTEX `whisper`: only one of {whisper-large, whisper-fast} runs.
  whisper-large:
    enabled: false
    type: "whisper"
    model: "whisper-large-v3"
    description: "Whisper Large-v3 (primary STT) — whisper-server"
    mutex_group: "whisper"
    binary: "whisper-server"
    args:
      --host: "0.0.0.0"
      --port: "8083"
      --model: ""              # REQUIRED: path to Whisper Large-v3 model
      --threads: "2"
    extra_args: []
    health_check_url: "http://localhost:8083/health"
    expected_memory_gb: 3.0

  # Fast STT (Whisper Small or Distil). Lower latency / quality.
  # MUTEX `whisper`: only one of {whisper-large, whisper-fast} runs.
  whisper-fast:
    enabled: false
    type: "whisper"
    model: "whisper-small"
    description: "Whisper Small/Distil (fast STT) — whisper-server"
    mutex_group: "whisper"
    binary: "whisper-server"
    args:
      --host: "0.0.0.0"
      --port: "8086"
      --model: ""              # REQUIRED: path to Whisper Small or Distil model
      --threads: "2"
    extra_args: []
    health_check_url: "http://localhost:8086/health"
    expected_memory_gb: 1.0

# ---------------------------------------------------------------------------
# Docker Compose stack (LiteLLM, Grafana, Prometheus, Loki).
# ---------------------------------------------------------------------------
docker:
  auto_launch: true
  compose_file: "docker/docker-compose.yml"

# ---------------------------------------------------------------------------
# Health monitoring for all managed services.
# ---------------------------------------------------------------------------
health_check:
  interval_sec: 15
  restart_delay_sec: 5
  max_restart_attempts: 3
  restart_backoff_multiplier: 1.5

# ---------------------------------------------------------------------------
# Memory budget tracking (Apple Silicon unified memory).
# ---------------------------------------------------------------------------
memory:
  reserved_gb: 7               # reserved for macOS + Docker + overhead
  pressure_threshold: 0.90     # warn when used memory exceeds this fraction
