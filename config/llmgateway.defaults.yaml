# =============================================================================
# LLM Gateway — Default Configuration
# =============================================================================
# This file contains the shipped defaults. DO NOT edit this file.
# User overrides go in config/llmgateway.yaml (created on first run).
#
# The gateway service reads both files: defaults first, then user overrides.
# Reset to defaults by deleting config/llmgateway.yaml.
# =============================================================================

gateway:
  host: "127.0.0.1"
  port: 8080
  log_level: "INFO"

# ---------------------------------------------------------------------------
# Local inference services managed by the gateway.
# Set enabled: true to have the gateway start and monitor the service.
# Set enabled: false to skip (the service entry is preserved for later use).
# ---------------------------------------------------------------------------
services:
  ollama:
    enabled: true
    type: "ollama"
    description: "Ollama — Local LLM runtime (Apple Metal GPU)"
    binary: "ollama"
    host: "localhost"
    port: 11434
    health_check_url: "http://localhost:11434/api/tags"
    auto_start: true
    models_dir: "~/.ollama/models"
    expected_memory_gb: 0      # varies by loaded model

  # Example llama-server instance (disabled by default).
  # Duplicate and rename this block to run multiple llama-server instances.
  fast_model:
    enabled: false
    type: "llamacpp"
    description: "Fast model — llama-server"
    binary: "llama-server"
    args:
      --host: "0.0.0.0"
      --port: "8081"
      --model: ""              # REQUIRED: path to .gguf file
      --n-gpu-layers: "99"
      --ctx-size: "8192"
      --threads: "4"
      --parallel: "3"
    extra_args:
      - "--cont-batching"
      - "--flash-attn"
      - "--mlock"
    health_check_url: "http://localhost:8081/health"
    expected_memory_gb: 3.0

  deep_model:
    enabled: false
    type: "llamacpp"
    description: "Deep reasoner — llama-server with speculative decoding"
    binary: "llama-server"
    args:
      --host: "0.0.0.0"
      --port: "8082"
      --model: ""              # REQUIRED: path to main .gguf file
      --model-draft: ""        # path to draft model .gguf
      --n-gpu-layers: "99"
      --ctx-size: "16384"
      --threads: "6"
      --parallel: "2"
      --draft-max: "8"
    extra_args:
      - "--cont-batching"
      - "--flash-attn"
      - "--mlock"
    health_check_url: "http://localhost:8082/health"
    expected_memory_gb: 21.0

  whisper:
    enabled: false
    type: "whisper"
    description: "Whisper — Speech-to-text (whisper-server or mlx-whisper)"
    binary: "whisper-server"
    args:
      --host: "0.0.0.0"
      --port: "8083"
      --model: ""              # REQUIRED: path to whisper model
      --threads: "2"
    extra_args: []
    health_check_url: "http://localhost:8083/health"
    expected_memory_gb: 1.5

# ---------------------------------------------------------------------------
# Docker Compose stack (LiteLLM, Grafana, Prometheus, Loki).
# ---------------------------------------------------------------------------
docker:
  auto_launch: true
  compose_file: "docker/docker-compose.yml"

# ---------------------------------------------------------------------------
# Health monitoring for all managed services.
# ---------------------------------------------------------------------------
health_check:
  interval_sec: 15
  restart_delay_sec: 5
  max_restart_attempts: 5
  restart_backoff_multiplier: 1.5

# ---------------------------------------------------------------------------
# Memory budget tracking (Apple Silicon unified memory).
# ---------------------------------------------------------------------------
memory:
  reserved_gb: 7               # reserved for macOS + Docker + overhead
  pressure_threshold: 0.90     # warn when used memory exceeds this fraction
