# ============================================================
# LLM Gateway — LiteLLM Proxy Configuration
# ============================================================
# Default stack: Anthropic Claude via OpenRouter + native llama-server locals
# Clients: Claude Code, Cursor IDE, any OpenAI/Anthropic SDK
#
# Local routes call native llama-server instances managed by the gateway
# (services: local-fast on :8081, local-coding on :8082). Docker Model
# Runner is used only for model downloads, not for serving.
# ============================================================

# ── Model Deployments ─────────────────────────────────────────
# model_name = pseudo-model (what clients request)
# litellm_params.model = actual provider/model (what gets called)
# Multiple entries with the same model_name are load-balanced
# and used as fallbacks via the 'order' parameter.

model_list:

  # ── deep-reasoning ──────────────────────────────────────────
  # Primary workhorse for Claude Code and Cursor.
  # OpenRouter primary → direct Anthropic fallback.
  - model_name: deep-reasoning
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4
      api_key: os.environ/OPENROUTER_API_KEY
      order: 1
      rpm: 100
      tpm: 200000
  - model_name: deep-reasoning
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY
      order: 2
      rpm: 50
      tpm: 100000

  # ── coding ──────────────────────────────────────────────────
  # Optimized for code generation, review, and refactoring.
  - model_name: coding
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4
      api_key: os.environ/OPENROUTER_API_KEY
      order: 1
      rpm: 100
      tpm: 200000
  - model_name: coding
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY
      order: 2
      rpm: 50
      tpm: 100000

  # ── vision ──────────────────────────────────────────────────
  # Image understanding — screenshots, diagrams, UI mockups.
  - model_name: vision
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4
      api_key: os.environ/OPENROUTER_API_KEY
      order: 1
      rpm: 60
      tpm: 100000
  - model_name: vision
    litellm_params:
      model: openrouter/openai/gpt-4o
      api_key: os.environ/OPENROUTER_API_KEY
      order: 2
      rpm: 60
      tpm: 100000

  # ── cheap-research ──────────────────────────────────────────
  # Affordable models for bulk research, summarization, triage.
  # Round-robin across cheap providers via equal rpm weights.
  - model_name: cheap-research
    litellm_params:
      model: openrouter/deepseek/deepseek-chat
      api_key: os.environ/OPENROUTER_API_KEY
      rpm: 120
      tpm: 500000
  - model_name: cheap-research
    litellm_params:
      model: openrouter/meta-llama/llama-3.1-70b-instruct
      api_key: os.environ/OPENROUTER_API_KEY
      rpm: 120
      tpm: 500000
  - model_name: cheap-research
    litellm_params:
      model: openrouter/mistralai/mistral-small-latest
      api_key: os.environ/OPENROUTER_API_KEY
      rpm: 120
      tpm: 500000

  # ── budget ──────────────────────────────────────────────────
  # Cheapest available for high-volume low-stakes tasks.
  - model_name: budget
    litellm_params:
      model: openrouter/deepseek/deepseek-chat
      api_key: os.environ/OPENROUTER_API_KEY
      rpm: 200
      tpm: 1000000
  - model_name: budget
    litellm_params:
      model: openrouter/meta-llama/llama-3.1-8b-instruct
      api_key: os.environ/OPENROUTER_API_KEY
      rpm: 200
      tpm: 1000000

  # ── local-fast ──────────────────────────────────────────────
  # Small fast local model. Native llama-server (`local-fast` service on host
  # port 8081). Aliased as `heartbeat` for health checks / smoke tests.
  - model_name: local-fast
    litellm_params:
      model: openai/local-fast
      api_base: http://host.docker.internal:8081/v1
      api_key: not-needed
      order: 1
      rpm: 300

  # ── local-only ──────────────────────────────────────────────
  # Never leaves the machine. Routes to the `local-coding` llama-server
  # instance on host port 8082.
  - model_name: local-only
    litellm_params:
      model: openai/local-coding
      api_base: http://host.docker.internal:8082/v1
      api_key: not-needed
      order: 1
      rpm: 60

  # ── local-coding ────────────────────────────────────────────
  # Qwen3-Coder-30B served by the gateway's `local-coding` llama-server
  # instance on host port 8082.
  - model_name: local-coding
    litellm_params:
      model: openai/local-coding
      api_base: http://host.docker.internal:8082/v1
      api_key: not-needed
      rpm: 60

  # ── Direct pass-through models ──────────────────────────────
  # Clients can also request specific models directly using
  # LiteLLM model format strings. These aliases provide
  # convenient shortcuts for commonly used models.

  - model_name: claude-sonnet
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: claude-haiku
    litellm_params:
      model: openrouter/anthropic/claude-3.5-haiku
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: claude-opus
    litellm_params:
      model: openrouter/anthropic/claude-opus-4
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: gpt-4o
    litellm_params:
      model: openrouter/openai/gpt-4o
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: deepseek
    litellm_params:
      model: openrouter/deepseek/deepseek-chat
      api_key: os.environ/OPENROUTER_API_KEY


# ── LiteLLM SDK Settings ─────────────────────────────────────

litellm_settings:
  # Telemetry + web-search interception.
  #
  # `websearch_interception` lets clients send a tool named `litellm_web_search`
  # and the proxy executes it server-side against the first entry in
  # `search_tools` below (omit `search_tool_name:` to use the first entry; set
  # it explicitly to pin a different one).
  #
  # `enabled_providers` lists the underlying LLM providers whose tool calls
  # are intercepted. NOTE: openrouter is NOT in LiteLLM's supported list —
  # for interception to fire on Claude/GPT routes you need direct provider
  # keys (ANTHROPIC_API_KEY, OPENAI_API_KEY) and a route that uses them.
  callbacks:
    - prometheus
    - websearch_interception:
        search_tool_name: tavily-search   # default — clients hitting litellm_web_search land here
        enabled_providers:
          - anthropic
          - openai
          - azure
          - deepseek
          - xai
          - vertex_ai

  # Drop unsupported params instead of erroring
  drop_params: true

  # Fallback chains: if primary pseudo-model fails entirely,
  # try these alternatives
  fallbacks:
    - {"deep-reasoning": ["coding"]}
    - {"coding": ["deep-reasoning"]}
    - {"vision": ["deep-reasoning"]}

  # Context window fallbacks: auto-switch to larger context model
  context_window_fallbacks:
    - {"deep-reasoning": ["cheap-research"]}

  # Cache (optional — uncomment to enable Redis response caching)
  # cache: true
  # cache_params:
  #   type: redis
  #   host: redis
  #   port: 6379

  # Request logging (opt-in — stores prompts in spend logs table)
  # store_prompts_in_spend_logs: true

  # Retry settings
  num_retries: 2
  request_timeout: 120


# ── Router Settings ───────────────────────────────────────────

router_settings:
  # Use priority ordering (order parameter) with fallback
  enable_pre_call_checks: true

  # Routing strategy for same-priority deployments
  routing_strategy: simple-shuffle

  # Cooldown: if a deployment fails 3 times, skip it for 60s
  allowed_fails: 3
  cooldown_time: 60

  # Retry on specific errors
  retry_after: 5
  num_retries: 2

  # Model aliases for backward compatibility
  model_group_alias:
    "reasoning": "deep-reasoning"
    "code": "coding"
    "local": "local-only"
    "heartbeat": "local-fast"


# ── Proxy Server Settings ────────────────────────────────────

general_settings:
  # Master key for admin operations (key/team/budget management)
  master_key: os.environ/LITELLM_MASTER_KEY

  # PostgreSQL for virtual keys, spend tracking, model management
  database_url: os.environ/DATABASE_URL

  # Background health checks — don't hammer providers on every /health
  background_health_checks: true
  health_check_interval: 300

  # Store models in DB so UI changes persist across restarts
  store_model_in_db: true

  # Allow direct model pass-through for models not in model_list
  # (clients can request any litellm-supported model string)
  # enable_all_model_access: true


# ── Web Search Tools (managed by the proxy) ───────────────────
# Keys live in .env; clients never see them. Clients invoke web search
# by including a tool named `litellm_web_search` in their request — the
# proxy intercepts it and runs the call against the first entry below.
# Reorder to swap the default, or set `search_tool_name:` under the
# `websearch_interception` callback in `litellm_settings` to pin one.

search_tools:
  - search_tool_name: tavily-search
    litellm_params:
      search_provider: tavily
      api_key: os.environ/TAVILY_API_KEY

  - search_tool_name: exa-search
    litellm_params:
      search_provider: exa_ai
      api_key: os.environ/EXA_API_KEY


# ── Environment Variables Reference ──────────────────────────
# These are read from the container environment (.env file).
# See .env.example for the full template (and dashboard Secrets UI).
#
#   LITELLM_MASTER_KEY    — admin key for /key, /team, /ui (required)
#   DATABASE_URL          — PostgreSQL connection string (set by stack)
#   OPENROUTER_API_KEY    — primary remote provider (required)
#   ANTHROPIC_API_KEY     — direct Anthropic fallback (optional)
#   OPENAI_API_KEY        — direct OpenAI (optional)
#   OPENAI_BASE_URL       — custom OpenAI base URL (optional; OPENAI_API_BASE also supported)
#   GEMINI_API_KEY        — Google AI Studio (optional)
#   XAI_API_KEY           — xAI / Grok (optional)
#   AZURE_API_KEY, AZURE_API_BASE, AZURE_API_VERSION — Azure OpenAI (optional)
#   PERPLEXITY_API_KEY    — Perplexity (optional)
#   TAVILY_API_KEY        — Tavily web search (used by websearch_interception)
#   EXA_API_KEY           — Exa neural search (used by websearch_interception)
#   OAUTH_*               — OAuth 2.0 token validation (optional, enterprise)

