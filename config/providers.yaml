# Provider configuration
# API keys are loaded from environment variables (see .env).
# This file controls provider-specific settings and timeouts.

default_timeout: 120

providers:
  openrouter:
    enabled: true
    base_url: https://openrouter.ai/api/v1
    # API key from env: OPENROUTER_API_KEY
    max_retries: 2
    timeout: 120

  openai:
    enabled: true
    # API key from env: OPENAI_API_KEY
    max_retries: 2
    timeout: 60

  anthropic:
    enabled: true
    # API key from env: ANTHROPIC_API_KEY
    max_retries: 2
    timeout: 120

  google:
    enabled: true
    # API key from env: GOOGLE_API_KEY
    max_retries: 2
    timeout: 60

  ollama:
    enabled: true
    base_url: http://localhost:11434
    timeout: 300
