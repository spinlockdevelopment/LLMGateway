# OpenTelemetry Collector configuration for LLM Gateway

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

  memory_limiter:
    check_interval: 5s
    limit_mib: 256
    spike_limit_mib: 64

exporters:
  # Export metrics in Prometheus format for Grafana
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: llm_gateway

  # Debug exporter for development (logs to collector stdout)
  debug:
    verbosity: basic

  # Export traces to Loki as logs (optional — for trace-to-log correlation)
  loki:
    endpoint: http://loki:3100/loki/api/v1/push

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus, debug]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [loki, debug]
