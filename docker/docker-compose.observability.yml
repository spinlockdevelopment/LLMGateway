# ============================================================
# LLM Gateway — Observability Stack (Optional)
# ============================================================
# Prometheus + Loki + Alloy + Grafana — use with the core compose file:
#
#   docker compose -f docker/docker-compose.yml \
#                  -f docker/docker-compose.observability.yml up -d
#
# After startup:
#   Grafana:     http://localhost:3000
#   Prometheus:  http://localhost:9090
# ============================================================

services:

  # ── Prometheus ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - litellm
    restart: unless-stopped
    networks:
      - gateway-net

  # ── Loki (log aggregation) ────────────────────────────────
  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
    restart: unless-stopped
    networks:
      - gateway-net

  # ── Grafana Alloy (log + metrics collection) ───────────────
  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    volumes:
      - ./alloy/alloy-config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run /etc/alloy/config.alloy
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - gateway-net

  # ── Grafana (dashboards) ───────────────────────────────────
  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-llmgateway}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki
      - prometheus
    restart: unless-stopped
    networks:
      - gateway-net

volumes:
  prometheus-data:
  loki-data:
  grafana-data:
