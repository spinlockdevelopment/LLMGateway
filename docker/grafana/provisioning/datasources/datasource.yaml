# Grafana datasource provisioning for LLM Gateway

apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: true

  - name: Prometheus (OTEL)
    type: prometheus
    access: proxy
    url: http://otel-collector:8889
    isDefault: true
    editable: true
