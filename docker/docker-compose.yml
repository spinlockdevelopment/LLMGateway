# ============================================================
# LLM Gateway — Docker Compose Stack
# ============================================================
# LiteLLM Proxy + PostgreSQL + Observability (Prometheus, Grafana, Loki, Alloy)
#
# Usage:
#   docker compose -f docker/docker-compose.yml up -d
#
# Local inference is provided by Docker Model Runner (bundled with Docker
# Desktop). LiteLLM reaches it at http://model-runner.docker.internal/engines/v1.
#
# After startup:
#   LiteLLM Proxy:  http://localhost:4000
#   LiteLLM UI:     http://localhost:4000/ui
#   Grafana:        http://localhost:3000
#   Prometheus:     http://localhost:9090
# ============================================================

services:

  # ── PostgreSQL (virtual keys, spend tracking, model DB) ─────
  postgres:
    image: postgres:16-alpine
    container_name: llm-postgres
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
    ports:
      - "5432:5432"
    volumes:
      - /opt/storage/llmgateway/docker-volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - gateway-net

  # ── LiteLLM Proxy ──────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: llm-gateway
    ports:
      - "4000:4000"
    # .env is passed via --env-file flag on docker compose invocations
    # (allows .env to live outside the repo, e.g. ~/.llm-gateway/.env).
    # Compose's --env-file only enables ${VAR} substitution; vars must
    # also be listed here to reach the container.
    environment:
      CONFIG_FILE_PATH: /app/config.yaml
      DATABASE_URL: postgresql://litellm:litellm@postgres:5432/litellm
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_API_BASE: ${OPENROUTER_API_BASE:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_API_BASE: ${ANTHROPIC_API_BASE:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-}
      OPENAI_ORGANIZATION: ${OPENAI_ORGANIZATION:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_API_BASE: ${GEMINI_API_BASE:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      XAI_API_BASE: ${XAI_API_BASE:-}
      AZURE_API_KEY: ${AZURE_API_KEY:-}
      AZURE_API_BASE: ${AZURE_API_BASE:-}
      AZURE_API_VERSION: ${AZURE_API_VERSION:-}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}
      COHERE_API_KEY: ${COHERE_API_KEY:-}
      FIREWORKS_API_KEY: ${FIREWORKS_API_KEY:-}
      REPLICATE_API_KEY: ${REPLICATE_API_KEY:-}
      OAUTH_TOKEN_INFO_ENDPOINT: ${OAUTH_TOKEN_INFO_ENDPOINT:-}
      OAUTH_USER_ID_FIELD_NAME: ${OAUTH_USER_ID_FIELD_NAME:-}
      OAUTH_USER_ROLE_FIELD_NAME: ${OAUTH_USER_ROLE_FIELD_NAME:-}
      OAUTH_USER_TEAM_ID_FIELD_NAME: ${OAUTH_USER_TEAM_ID_FIELD_NAME:-}
    volumes:
      - ../config/litellm-config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      # The upstream image doesn't ship curl, so use python (which it does).
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=5).status == 200 else sys.exit(1)\""]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    networks:
      - gateway-net

  # ── Observability stack (opt-in via the `observability` profile) ──────
  # These four services are NOT started by default. The gateway's lean
  # default install relies on LiteLLM's built-in /ui + Postgres spend
  # tracking. Enable from the dashboard's Services panel (or with
  # `docker compose --profile observability up -d`) when you want
  # Grafana dashboards / PromQL / LogQL. Expect ~500 MB of additional
  # RAM and ~50 GB of disk over a few months of retention.

  # ── Prometheus ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /opt/storage/llmgateway/docker-volumes/prometheus:/prometheus
    depends_on:
      - litellm
    restart: unless-stopped
    networks:
      - gateway-net

  # ── Loki (log aggregation) ────────────────────────────────
  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    profiles: ["observability"]
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - /opt/storage/llmgateway/docker-volumes/loki:/loki
    restart: unless-stopped
    networks:
      - gateway-net

  # ── Grafana Alloy (log + metrics collection) ───────────────
  # Collects Docker container logs → Loki.
  # When external agents are added, expose port 4317 (OTLP gRPC)
  # and add an otelcol.receiver.otlp block to alloy-config.alloy.
  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    profiles: ["observability"]
    volumes:
      - ./alloy/alloy-config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run /etc/alloy/config.alloy
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - gateway-net

  # ── Grafana (dashboards) ───────────────────────────────────
  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    profiles: ["observability"]
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-llmgateway}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - /opt/storage/llmgateway/docker-volumes/grafana:/var/lib/grafana
    depends_on:
      - loki
      - prometheus
    restart: unless-stopped
    networks:
      - gateway-net

  # Note: Kokoro TTS used to run here as the `kokoro` service (profile: tts).
  # It now runs as a gateway-managed mlx_audio.server process (Metal GPU/ANE
  # via MLX) — see config/llmgateway.defaults.yaml services.kokoro.

  # ── Open WebUI ─────────────────────────────────────────────
  # Browser chat UI wired to:
  #   chat → LiteLLM proxy (in-network)        http://litellm:4000/v1
  #   TTS  → Kokoro on host's mlx_audio.server http://host.docker.internal:8880/v1
  #   STT  → Whisper on host's mlx_audio.server http://host.docker.internal:8086/v1
  # Reachable at http://localhost:3001.
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3001:8080"
    environment:
      # Chat models via LiteLLM (OpenAI-compatible). Container-to-container
      # via the compose network, so no host.docker.internal hop needed.
      OPENAI_API_BASE_URLS: "http://litellm:4000/v1"
      OPENAI_API_KEYS: "${LITELLM_MASTER_KEY:-}"
      ENABLE_OLLAMA_API: "false"
      # TTS — Kokoro on the host via mlx_audio.server (port 8880).
      # AUDIO_TTS_MODEL must be the full HuggingFace repo id; mlx_audio
      # uses it to resolve the model files. A bare "kokoro" gets treated
      # as an HF repo and 401s, then locks the server into a state where
      # later valid requests also return empty 200 OK responses.
      AUDIO_TTS_ENGINE: "openai"
      AUDIO_TTS_OPENAI_API_BASE_URL: "http://host.docker.internal:8880/v1"
      AUDIO_TTS_OPENAI_API_KEY: "sk-no-auth"
      AUDIO_TTS_MODEL: "mlx-community/Kokoro-82M-bf16"
      AUDIO_TTS_VOICE: "af_bella"
      # STT — whisper-large-v3-turbo on the host via whisper.cpp's
      # whisper-server (port 8083). The server's inference path is
      # remapped to /v1/audio/transcriptions via --inference-path so it
      # speaks OpenAI's audio API directly. AUDIO_STT_MODEL is a label
      # only; whisper-server uses whatever model it was launched with.
      AUDIO_STT_ENGINE: "openai"
      AUDIO_STT_OPENAI_API_BASE_URL: "http://host.docker.internal:8083/v1"
      AUDIO_STT_OPENAI_API_KEY: "sk-no-auth"
      AUDIO_STT_MODEL: "whisper-large-v3-turbo"
      # Single-user local install — no signup wall.
      WEBUI_AUTH: "false"
      # Pin the session-signing key so `docker compose up --force-recreate`
      # (or any container rebuild) doesn't invalidate existing browser
      # sessions. Without this, Open WebUI regenerates a random key on
      # every fresh container, and all logged-in users get 401 on every
      # /api/v1/* call until they sign out and back in.
      WEBUI_SECRET_KEY: "${WEBUI_SECRET_KEY:-}"
    volumes:
      - /opt/storage/llmgateway/docker-volumes/open-webui:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      litellm:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gateway-net

# All persistent state is bind-mounted under /opt/storage/llmgateway/docker-volumes/
# so it survives an OS wipe (see scripts/data_dir.py for the full layout).

networks:
  gateway-net:
    driver: bridge
