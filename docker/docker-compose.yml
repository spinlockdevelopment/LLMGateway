# LLM Gateway — Docker Compose Stack
# Includes: Gateway, OpenTelemetry Collector, Loki, Promtail, Grafana
#
# Usage:
#   docker compose -f docker/docker-compose.yml up -d
#
# The gateway connects to Ollama running on the HOST (bare metal for Metal acceleration).
# Use host.docker.internal or the host's IP to reach Ollama from the container.

services:

  # ── LLM Gateway ──────────────────────────────────────────────
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: llm-gateway
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - GATEWAY_HOST=0.0.0.0
      - GATEWAY_PORT=8000
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      # On macOS Docker, host.docker.internal reaches the host
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - USAGE_DB_PATH=/app/data/usage.db
    volumes:
      - ../config:/app/config:ro
      - gateway-data:/app/data
      - gateway-logs:/app/logs
    depends_on:
      - otel-collector
      - loki
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - gateway-net

  # ── OpenTelemetry Collector ──────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.0
    container_name: otel-collector
    command: ["--config", "/etc/otel/config.yaml"]
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics export
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    restart: unless-stopped
    networks:
      - gateway-net

  # ── Loki (log aggregation) ───────────────────────────────────
  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
    restart: unless-stopped
    networks:
      - gateway-net

  # ── Promtail (log shipper) ───────────────────────────────────
  promtail:
    image: grafana/promtail:3.3.2
    container_name: promtail
    volumes:
      - ./promtail/promtail-config.yaml:/etc/promtail/config.yml:ro
      - gateway-logs:/var/log/gateway:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - gateway-net

  # ── Grafana (dashboards) ─────────────────────────────────────
  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=llmgateway
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki
      - otel-collector
    restart: unless-stopped
    networks:
      - gateway-net

volumes:
  gateway-data:
  gateway-logs:
  loki-data:
  grafana-data:

networks:
  gateway-net:
    driver: bridge
