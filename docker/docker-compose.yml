# ============================================================
# LLM Gateway — Docker Compose Stack (Core)
# ============================================================
# LiteLLM Proxy + PostgreSQL — the essential gateway services.
#
# Usage:
#   docker compose -f docker/docker-compose.yml up -d
#
# To include observability (Grafana, Prometheus, Loki, Alloy):
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.observability.yml up -d
#
# After startup:
#   LiteLLM Proxy:  http://localhost:4000
#   LiteLLM UI:     http://localhost:4000/ui
# ============================================================

services:

  # ── PostgreSQL (virtual keys, spend tracking, model DB) ─────
  postgres:
    image: postgres:16-alpine
    container_name: llm-postgres
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - gateway-net

  # ── LiteLLM Proxy ──────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: llm-gateway
    ports:
      - "4000:4000"
    # .env is passed via --env-file flag on docker compose invocations
    # (allows .env to live outside the repo, e.g. ~/.llm-gateway/.env)
    environment:
      LITELLM_CONFIG_FILE_PATH: /app/config.yaml
      DATABASE_URL: postgresql://litellm:litellm@postgres:5432/litellm
    volumes:
      - ../litellm-config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health/liveliness || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    networks:
      - gateway-net

volumes:
  postgres-data:

networks:
  gateway-net:
    driver: bridge
