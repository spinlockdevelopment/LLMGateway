# ============================================================
# LLM Gateway — Docker Compose Stack
# ============================================================
# LiteLLM Proxy + PostgreSQL + Observability (Prometheus, Grafana, Loki, Alloy)
#
# Usage:
#   docker compose -f docker/docker-compose.yml up -d
#
# Ollama runs on bare metal (not Docker) for Apple Metal GPU.
# LiteLLM reaches Ollama via host.docker.internal.
#
# After startup:
#   LiteLLM Proxy:  http://localhost:4000
#   LiteLLM UI:     http://localhost:4000/ui
#   Grafana:        http://localhost:3000
#   Prometheus:     http://localhost:9090
# ============================================================

services:

  # ── PostgreSQL (virtual keys, spend tracking, model DB) ─────
  postgres:
    image: postgres:16-alpine
    container_name: llm-postgres
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - gateway-net

  # ── LiteLLM Proxy ──────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: llm-gateway
    ports:
      - "4000:4000"
    # .env is passed via --env-file flag on docker compose invocations
    # (allows .env to live outside the repo, e.g. ~/.llm-gateway/.env)
    environment:
      LITELLM_CONFIG_FILE_PATH: /app/config.yaml
      DATABASE_URL: postgresql://litellm:litellm@postgres:5432/litellm
    volumes:
      - ../litellm-config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health/liveliness || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    networks:
      - gateway-net

  # ── Prometheus ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - litellm
    restart: unless-stopped
    networks:
      - gateway-net

  # ── Loki (log aggregation) ────────────────────────────────
  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
    restart: unless-stopped
    networks:
      - gateway-net

  # ── Grafana Alloy (log + metrics collection) ───────────────
  # Collects Docker container logs → Loki.
  # When external agents are added, expose port 4317 (OTLP gRPC)
  # and add an otelcol.receiver.otlp block to alloy-config.alloy.
  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    volumes:
      - ./alloy/alloy-config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run /etc/alloy/config.alloy
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - gateway-net

  # ── Grafana (dashboards) ───────────────────────────────────
  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-llmgateway}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki
      - prometheus
    restart: unless-stopped
    networks:
      - gateway-net

volumes:
  postgres-data:
  prometheus-data:
  loki-data:
  grafana-data:

networks:
  gateway-net:
    driver: bridge
